# =============================================================================
# .github/workflows/splunk_search.yml — Splunk Client Workflow
# =============================================================================
#
# REQUIRED SECRETS (Settings > Secrets and variables > Actions)
# For a single SIEM target:
#   SPLUNK_HOST       your-org.splunkcloud.com
#   SPLUNK_TOKEN      eyJr...
#
# For multiple SIEM targets:
#   SPLUNK_HOST_PROD      SPLUNK_TOKEN_PROD
#   SPLUNK_HOST_STAGING   SPLUNK_TOKEN_STAGING
#   SPLUNK_HOST_LAB       SPLUNK_TOKEN_LAB
#
# OPTIONAL VARIABLES (Settings > Secrets and variables > Variables)
#   SPLUNK_VERIFY_SSL   true / false
#   RULES_FILE          path to rules file relative to spl-runner/ (default: rules.csv)
#   TIME_RANGE          time window (default: 30m)
#
# NOTE: All run steps use `working-directory: spl-runner` because the tool
#       lives in a subfolder of the siem-toolkit repository.
# =============================================================================

name: spl-runner

on:
  push:
    branches: [main, master]
    paths:
      - "spl-runner/**"          # only trigger when spl-runner files change
  pull_request:
    branches: [main, master]
    paths:
      - "spl-runner/**"
  workflow_dispatch:
    inputs:
      siem_target:
        description: "SIEM target (blank for default, or: prod / staging / lab)"
        required: false
        default: ""
      time_range:
        description: "Time range (e.g. 30m, 2h, 7d, all)"
        required: false
        default: "30m"
      rules_file:
        description: "Rules file path relative to spl-runner/"
        required: false
        default: "rules.csv"
      dry_run:
        description: "Validate only — do not submit to Splunk"
        type: boolean
        required: false
        default: false

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: validate — runs on every push and pull request
  # No Splunk credentials needed.
  # ---------------------------------------------------------------------------
  validate:
    name: Validate Rules
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spl-runner       # all steps run from inside spl-runner/

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: spl-runner/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate and analyse rules
        env:
          AUTH_MODE: env
        run: |
          RULES="${{ github.event.inputs.rules_file || vars.RULES_FILE || 'rules.csv' }}"
          python main.py --rules "$RULES" --dry-run --validate-schema

  # ---------------------------------------------------------------------------
  # Job 2: search — runs on main/master after validate passes
  # Requires SPLUNK_HOST and SPLUNK_TOKEN secrets.
  # ---------------------------------------------------------------------------
  search:
    name: Run Splunk Search
    runs-on: ubuntu-latest
    needs: validate
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      && github.event.inputs.dry_run != 'true'
    defaults:
      run:
        working-directory: spl-runner       # all steps run from inside spl-runner/

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: spl-runner/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run searches
        env:
          AUTH_MODE: env
          SPLUNK_HOST:           ${{ secrets.SPLUNK_HOST }}
          SPLUNK_TOKEN:          ${{ secrets.SPLUNK_TOKEN }}
          SPLUNK_HOST_PROD:      ${{ secrets.SPLUNK_HOST_PROD }}
          SPLUNK_TOKEN_PROD:     ${{ secrets.SPLUNK_TOKEN_PROD }}
          SPLUNK_HOST_STAGING:   ${{ secrets.SPLUNK_HOST_STAGING }}
          SPLUNK_TOKEN_STAGING:  ${{ secrets.SPLUNK_TOKEN_STAGING }}
          SPLUNK_HOST_LAB:       ${{ secrets.SPLUNK_HOST_LAB }}
          SPLUNK_TOKEN_LAB:      ${{ secrets.SPLUNK_TOKEN_LAB }}
          SIEM_TARGET:           ${{ github.event.inputs.siem_target || '' }}
          SPLUNK_VERIFY_SSL:     ${{ vars.SPLUNK_VERIFY_SSL || 'true' }}
        run: |
          # Skip gracefully if no credentials are configured yet.
          # Add SPLUNK_HOST and SPLUNK_TOKEN in:
          #   Settings -> Secrets and variables -> Actions -> New repository secret
          if [ -z "$SPLUNK_HOST" ] || [ -z "$SPLUNK_TOKEN" ]; then
            echo "::notice::SPLUNK_HOST or SPLUNK_TOKEN not configured — skipping search run."
            echo "To enable: add SPLUNK_HOST and SPLUNK_TOKEN in repository secrets."
            exit 0
          fi
          RULES="${{ github.event.inputs.rules_file || vars.RULES_FILE || 'rules.csv' }}"
          TIME="${{ github.event.inputs.time_range || vars.TIME_RANGE || '30m' }}"
          echo "Rules file : $RULES"
          echo "Time range : $TIME"
          echo "SIEM target: ${SIEM_TARGET:-default}"
          python main.py --rules "$RULES" --time "$TIME"

      - name: Upload results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: splunk-results-${{ github.run_number }}
          path: spl-runner/search_results/   # path relative to repo root for upload
          retention-days: 7
